# Nginx 网关监控模板
meta:
  tech_stack: "gw_nginx"
  version: "1.0"

scrape_configs:
  - job_name: "{{service_name}}-nginx"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["{{host}}:{{port}}"]

alerting_rules:
  - alert: "{{service_name}}_NginxHighErrorRate"
    expr: 'rate(nginx_http_requests_total{service="{{service_name}}",status=~"5.."}[5m]) / rate(nginx_http_requests_total{service="{{service_name}}"}[5m]) > {{error_rate_threshold}} / 100'
    for: "2m"
    labels:
      severity: critical
      team: "{{team_name}}"
    annotations:
      summary: "Nginx {{service_name}} 错误率超过 {{error_rate_threshold}}%"

  - alert: "{{service_name}}_NginxHighP99Latency"
    expr: 'histogram_quantile(0.99, rate(nginx_http_request_duration_seconds_bucket{service="{{service_name}}"}[5m])) > {{p99_latency_threshold}} / 1000'
    for: "3m"
    labels:
      severity: warning
      team: "{{team_name}}"
    annotations:
      summary: "Nginx {{service_name}} P99 延迟超过 {{p99_latency_threshold}}ms"

  - alert: "{{service_name}}_NginxHighConnections"
    expr: 'nginx_connections_active{service="{{service_name}}"} / nginx_connections_waiting{service="{{service_name}}"} > 10'
    for: "2m"
    labels:
      severity: warning
      team: "{{team_name}}"
    annotations:
      summary: "Nginx {{service_name}} 活跃连接数比例异常"

business_metrics:
  - name: "{{service_name}}_upstream_latency"
    type: histogram
    labels: ["upstream", "status"]
    buckets: [10, 25, 50, 100, 250, 500, 1000]
