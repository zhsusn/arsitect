# Node.js 应用监控模板
meta:
  tech_stack: "nodejs"
  version: "1.0"

scrape_configs:
  - job_name: "{{service_name}}-metrics"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["{{host}}:{{port}}"]

alerting_rules:
  - alert: "{{service_name}}_HighCpuUsage"
    expr: 'process_cpu_usage{service="{{service_name}}"} > {{cpu_threshold}}'
    for: "2m"
    labels:
      severity: warning
      team: "{{team_name}}"
    annotations:
      summary: "服务 {{service_name}} CPU 使用率超过 {{cpu_threshold}}%"

  - alert: "{{service_name}}_HighMemoryUsage"
    expr: 'process_resident_memory_bytes{service="{{service_name}}"} > {{memory_threshold}} / 100 * nodejs_memory_limit_bytes{service="{{service_name}}"}'
    for: "2m"
    labels:
      severity: warning
      team: "{{team_name}}"
    annotations:
      summary: "服务 {{service_name}} 内存使用率超过 {{memory_threshold}}%"

  - alert: "{{service_name}}_HighErrorRate"
    expr: 'rate(http_requests_total{service="{{service_name}}",status=~"5.."}[5m]) > {{error_rate_threshold}} / 100'
    for: "2m"
    labels:
      severity: critical
      team: "{{team_name}}"
    annotations:
      summary: "服务 {{service_name}} HTTP 5xx 错误率超过 {{error_rate_threshold}}%"

  - alert: "{{service_name}}_EventLoopLag"
    expr: 'nodejs_eventloop_lag_seconds{service="{{service_name}}"} > 0.5'
    for: "3m"
    labels:
      severity: warning
      team: "{{team_name}}"
    annotations:
      summary: "服务 {{service_name}} Event Loop 延迟超过 500ms"

business_metrics:
  - name: "{{service_name}}_core_api_latency"
    type: histogram
    labels: ["route", "method"]
    buckets: [50, 100, 200, 500, 1000, 2000]

  - name: "{{service_name}}_async_jobs_total"
    type: counter
    labels: ["job_name", "status"]
