# Go 应用监控模板（Gin/Echo/Fiber 通用）
meta:
  tech_stack: "golang"
  version: "1.0"

scrape_configs:
  - job_name: "{{service_name}}-metrics"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["{{host}}:{{port}}"]

alerting_rules:
  - alert: "{{service_name}}_HighCpuUsage"
    expr: 'rate(process_cpu_seconds_total{service="{{service_name}}"}[5m]) > {{cpu_threshold}} / 100'
    for: "2m"
    labels:
      severity: warning
      team: "{{team_name}}"
    annotations:
      summary: "服务 {{service_name}} CPU 使用率超过 {{cpu_threshold}}%"

  - alert: "{{service_name}}_HighMemoryUsage"
    expr: 'process_resident_memory_bytes{service="{{service_name}}"} > {{memory_threshold}} / 100 * {{memory_limit_bytes}}'
    for: "2m"
    labels:
      severity: warning
      team: "{{team_name}}"
    annotations:
      summary: "服务 {{service_name}} 内存使用率超过 {{memory_threshold}}%"

  - alert: "{{service_name}}_HighErrorRate"
    expr: 'rate(http_requests_total{service="{{service_name}}",status=~"5.."}[5m]) > {{error_rate_threshold}} / 100'
    for: "2m"
    labels:
      severity: critical
      team: "{{team_name}}"
    annotations:
      summary: "服务 {{service_name}} HTTP 5xx 错误率超过 {{error_rate_threshold}}%"

  - alert: "{{service_name}}_GoroutinesSpike"
    expr: 'go_goroutines{service="{{service_name}}"} > {{goroutine_threshold}}'
    for: "3m"
    labels:
      severity: warning
      team: "{{team_name}}"
    annotations:
      summary: "服务 {{service_name}} Goroutine 数量超过 {{goroutine_threshold}}"

business_metrics:
  - name: "{{service_name}}_core_api_latency"
    type: histogram
    labels: ["path", "method"]
    buckets: [10, 25, 50, 100, 250, 500, 1000, 2500]

  - name: "{{service_name}}_external_calls_total"
    type: counter
    labels: ["target", "method", "status"]
