
<!DOCTYPE html>
<html>
<head>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 794px; height: 1123px; background: linear-gradient(160deg, #1a2332 0%, #243447 40%, #2d4a5e 100%); position: relative; overflow: hidden; }
.grid { position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
    background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px; }
.glow1 { position: absolute; width: 600px; height: 600px; border-radius: 50%;
    background: radial-gradient(circle, rgba(100,180,200,0.12) 0%, transparent 70%);
    top: -100px; right: -150px; }
.glow2 { position: absolute; width: 500px; height: 500px; border-radius: 50%;
    background: radial-gradient(circle, rgba(120,160,180,0.08) 0%, transparent 70%);
    bottom: 100px; left: -100px; }
.line1 { position: absolute; width: 2px; height: 400px; background: linear-gradient(to bottom, transparent, rgba(150,200,220,0.15), transparent);
    top: 100px; left: 120px; transform: rotate(15deg); }
.line2 { position: absolute; width: 2px; height: 300px; background: linear-gradient(to bottom, transparent, rgba(150,200,220,0.1), transparent);
    top: 200px; right: 180px; transform: rotate(-10deg); }
.hex { position: absolute; width: 200px; height: 200px; border: 1px solid rgba(150,200,220,0.08);
    transform: rotate(45deg); bottom: 150px; right: 100px; }
.dots { position: absolute; bottom: 80px; left: 60px; }
.dot { width: 4px; height: 4px; border-radius: 50%; background: rgba(150,200,220,0.2); display: inline-block; margin: 8px; }
.accent { position: absolute; width: 80px; height: 3px; background: linear-gradient(to right, rgba(150,200,220,0.4), transparent);
    top: 380px; left: 120px; }
</style>
</head>
<body>
<div class="grid"></div>
<div class="glow1"></div>
<div class="glow2"></div>
<div class="line1"></div>
<div class="line2"></div>
<div class="hex"></div>
<div class="dots">
  <div class="dot"></div><div class="dot"></div><div class="dot"></div>
</div>
<div class="accent"></div>
</body>
</html>
