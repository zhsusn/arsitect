
<!DOCTYPE html>
<html>
<head>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 794px; height: 1123px; background: linear-gradient(160deg, #1a2332 0%, #243447 60%, #2d4a5e 100%); position: relative; overflow: hidden; }
.grid { position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
    background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 40px 40px; }
.glow { position: absolute; width: 400px; height: 400px; border-radius: 50%;
    background: radial-gradient(circle, rgba(100,180,200,0.1) 0%, transparent 70%);
    top: 50%; left: 50%; transform: translate(-50%, -50%); }
</style>
</head>
<body>
<div class="grid"></div>
<div class="glow"></div>
</body>
</html>
