openapi: 3.1.0
info:
  title: Arsitect SDLC Visualizer API
  version: 1.0.0
  description: Arsitect 可视化驾驶舱 REST API 契约（基于详细设计 20/21 模块导出）
servers:
- url: /api/v1
  description: API v1 基线
paths:
  /executions/trigger:
    post:
      tags:
      - skill-executions
      summary: Trigger Execution
      description: '触发 Skill 执行。


        根据触发动作创建新的 SkillExecution 记录。'
      operationId: trigger_execution_api_v1_executions_trigger_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExecutionTriggerDTO'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SkillExecutionResponseDTO'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /executions/{execution_id}/status:
    get:
      tags:
      - skill-executions
      summary: Get Execution Status
      description: 查询执行状态。
      operationId: get_execution_status_api_v1_executions__execution_id__status_get
      parameters:
      - name: execution_id
        in: path
        required: true
        schema:
          type: string
          title: Execution Id
      - name: last_anchor
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Last Anchor
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExecutionStatusDTO'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /executions/{execution_id}/logs:
    get:
      tags:
      - skill-executions
      summary: Get Execution Logs
      description: 查询执行日志。
      operationId: get_execution_logs_api_v1_executions__execution_id__logs_get
      parameters:
      - name: execution_id
        in: path
        required: true
        schema:
          type: string
          title: Execution Id
      - name: keyword
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Keyword
      - name: level
        in: query
        required: false
        schema:
          type: string
          default: ALL
          title: Level
      - name: anchor
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Anchor
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogQueryResultDTO'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /executions/{execution_id}/retry:
    post:
      tags:
      - skill-executions
      summary: Retry Execution
      description: 重试失败的执行。
      operationId: retry_execution_api_v1_executions__execution_id__retry_post
      parameters:
      - name: execution_id
        in: path
        required: true
        schema:
          type: string
          title: Execution Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetryResultDTO'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /executions/{execution_id}/confirm-release:
    post:
      tags:
      - skill-executions
      summary: Confirm Release
      description: 确认发布类 Skill 的执行。
      operationId: confirm_release_api_v1_executions__execution_id__confirm_release_post
      parameters:
      - name: execution_id
        in: path
        required: true
        schema:
          type: string
          title: Execution Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SkillExecutionResponseDTO'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /executions/{execution_id}/sse:
    get:
      tags:
      - skill-executions
      summary: Subscribe Sse
      description: SSE 状态流推送。
      operationId: subscribe_sse_api_v1_executions__execution_id__sse_get
      parameters:
      - name: execution_id
        in: path
        required: true
        schema:
          type: string
          title: Execution Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /applications:
    post:
      tags:
      - applications
      summary: Create Application
      description: Create a new application.
      operationId: create_application_api_v1_applications_post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApplicationCreateDTO'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationResponseDTO'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      tags:
      - applications
      summary: List Applications
      description: List all applications with pagination.
      operationId: list_applications_api_v1_applications_get
      parameters:
      - name: workspace_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Workspace Id
      - name: page
        in: query
        required: false
        schema:
          type: integer
          default: 1
          title: Page
      - name: page_size
        in: query
        required: false
        schema:
          type: integer
          default: 50
          title: Page Size
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageResponse_ApplicationResponseDTO_'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /applications/{application_id}:
    get:
      tags:
      - applications
      summary: Get Application
      description: Get a single application by ID.
      operationId: get_application_api_v1_applications__application_id__get
      parameters:
      - name: application_id
        in: path
        required: true
        schema:
          type: string
          title: Application Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationResponseDTO'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    patch:
      tags:
      - applications
      summary: Update Application
      description: Partially update an existing application.
      operationId: update_application_api_v1_applications__application_id__patch
      parameters:
      - name: application_id
        in: path
        required: true
        schema:
          type: string
          title: Application Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApplicationUpdateDTO'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationResponseDTO'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - applications
      summary: Delete Application
      description: Delete an application.
      operationId: delete_application_api_v1_applications__application_id__delete
      parameters:
      - name: application_id
        in: path
        required: true
        schema:
          type: string
          title: Application Id
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /projects/{project_id}/execution-plans:
    post:
      tags:
      - execution-plans
      summary: Create Execution Plan
      description: 生成执行计划。
      operationId: create_execution_plan_api_v1_projects__project_id__execution_plans_post
      parameters:
      - name: project_id
        in: path
        required: true
        schema:
          type: string
          title: Project Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/_GeneratePlanPayload'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExecutionPlanResponseDTO'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /execution-plans/{plan_id}/validate:
    post:
      tags:
      - execution-plans
      summary: Validate Execution Plan
      description: 校验计划调整。
      operationId: validate_execution_plan_api_v1_execution_plans__plan_id__validate_post
      parameters:
      - name: plan_id
        in: path
        required: true
        schema:
          type: string
          title: Plan Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/PlanAdjustmentDTO'
              title: Adjustments
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlanValidationResultDTO'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /execution-plans/{plan_id}/freeze:
    post:
      tags:
      - execution-plans
      summary: Freeze Execution Plan
      description: 冻结计划。
      operationId: freeze_execution_plan_api_v1_execution_plans__plan_id__freeze_post
      parameters:
      - name: plan_id
        in: path
        required: true
        schema:
          type: string
          title: Plan Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExecutionPlanResponseDTO'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /execution-plans/{plan_id}:
    get:
      tags:
      - execution-plans
      summary: Get Execution Plan
      description: 获取执行计划。
      operationId: get_execution_plan_api_v1_execution_plans__plan_id__get
      parameters:
      - name: plan_id
        in: path
        required: true
        schema:
          type: string
          title: Plan Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExecutionPlanResponseDTO'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /execution-plans/{plan_id}/execute:
    post:
      tags:
      - execution-plans
      summary: Execute Execution Plan
      description: 启动执行（MVP 简化：调度第一个 Stage）。
      operationId: execute_execution_plan_api_v1_execution_plans__plan_id__execute_post
      parameters:
      - name: plan_id
        in: path
        required: true
        schema:
          type: string
          title: Plan Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StageExecutionResultDTO'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /execution-plans/{execution_id}/status:
    get:
      tags:
      - execution-plans
      summary: Get Execution Status
      description: 查询执行状态（MVP 简化：execution_id 即 plan_id）。
      operationId: get_execution_status_api_v1_execution_plans__execution_id__status_get
      parameters:
      - name: execution_id
        in: path
        required: true
        schema:
          type: string
          title: Execution Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Get Execution Status Api V1 Execution Plans  Execution Id  Status Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /executions/{execution_id}/bypass:
    post:
      tags:
      - execution-plans
      summary: Create Bypass
      description: 旁路审批执行。
      operationId: create_bypass_api_v1_executions__execution_id__bypass_post
      parameters:
      - name: execution_id
        in: path
        required: true
        schema:
          type: string
          title: Execution Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BypassRequestDTO'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BypassRecordDTO'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /executions/{execution_id}/bypass-status:
    get:
      tags:
      - execution-plans
      summary: List Bypass Records
      description: 旁路记录查询。
      operationId: list_bypass_records_api_v1_executions__execution_id__bypass_status_get
      parameters:
      - name: execution_id
        in: path
        required: true
        schema:
          type: string
          title: Execution Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BypassRecordDTO'
                title: Response List Bypass Records Api V1 Executions  Execution Id  Bypass Status Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /skills/import/scan:
    post:
      tags:
      - skills
      summary: Scan Skills
      description: Scan a directory for skills.
      operationId: scan_skills_api_v1_skills_import_scan_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SkillScanRequestDTO'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SkillScanResultDTO'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /skills/import/confirm:
    post:
      tags:
      - skills
      summary: Confirm Skill Import
      description: Confirm and import selected skills.
      operationId: confirm_skill_import_api_v1_skills_import_confirm_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SkillImportConfirmDTO'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SkillImportSummaryDTO'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /skills:
    get:
      tags:
      - skills
      summary: List Skills
      description: List registered skills with optional filters.
      operationId: list_skills_api_v1_skills_get
      parameters:
      - name: search
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Search
      - name: pattern
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Pattern
      - name: status
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Status
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SkillListResponseDTO'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /skills/dag:
    get:
      tags:
      - skills
      summary: Get Dag
      description: Get the current DAG snapshot.
      operationId: get_dag_api_v1_skills_dag_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DAGSnapshotDTO'
  /skills/dag/nodes:
    post:
      tags:
      - skills
      summary: Add Dag Node
      description: Add a node to the DAG canvas.
      operationId: add_dag_node_api_v1_skills_dag_nodes_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddDAGNodeRequestDTO'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DAGNodeDTO'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /skills/dag/nodes/{node_id}:
    delete:
      tags:
      - skills
      summary: Delete Dag Node
      description: Delete a node from the DAG canvas.
      operationId: delete_dag_node_api_v1_skills_dag_nodes__node_id__delete
      parameters:
      - name: node_id
        in: path
        required: true
        schema:
          type: string
          title: Node Id
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /skills/dag/edges:
    post:
      tags:
      - skills
      summary: Add Dag Edge
      description: Add an edge to the DAG canvas.
      operationId: add_dag_edge_api_v1_skills_dag_edges_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddDAGEdgeRequestDTO'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DAGEdgeDTO'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /skills/dag/edges/{edge_id}:
    delete:
      tags:
      - skills
      summary: Delete Dag Edge
      description: Delete an edge from the DAG canvas.
      operationId: delete_dag_edge_api_v1_skills_dag_edges__edge_id__delete
      parameters:
      - name: edge_id
        in: path
        required: true
        schema:
          type: string
          title: Edge Id
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /skills/dag/undo:
    post:
      tags:
      - skills
      summary: Undo Dag
      description: Undo the last DAG canvas operation.
      operationId: undo_dag_api_v1_skills_dag_undo_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DAGUndoRedoRequestDTO'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Undo Dag Api V1 Skills Dag Undo Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /skills/dag/redo:
    post:
      tags:
      - skills
      summary: Redo Dag
      description: Redo the last undone DAG canvas operation.
      operationId: redo_dag_api_v1_skills_dag_redo_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DAGUndoRedoRequestDTO'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Redo Dag Api V1 Skills Dag Redo Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /skills/dag/save:
    post:
      tags:
      - skills
      summary: Save Dag
      description: Persist the current DAG state to the database.
      operationId: save_dag_api_v1_skills_dag_save_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Save Dag Api V1 Skills Dag Save Post
  /skills/dag/changelog:
    get:
      tags:
      - skills
      summary: List Dag Changelog
      description: List DAG change logs.
      operationId: list_dag_changelog_api_v1_skills_dag_changelog_get
      parameters:
      - name: session_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Session Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DAGChangeLogDTO'
                title: Response List Dag Changelog Api V1 Skills Dag Changelog Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /skills/{skill_id}:
    get:
      tags:
      - skills
      summary: Get Skill
      description: Get a single skill by ID.
      operationId: get_skill_api_v1_skills__skill_id__get
      parameters:
      - name: skill_id
        in: path
        required: true
        schema:
          type: string
          title: Skill Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SkillResponseDTO'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - skills
      summary: Delete Skill
      description: Delete a skill by ID.
      operationId: delete_skill_api_v1_skills__skill_id__delete
      parameters:
      - name: skill_id
        in: path
        required: true
        schema:
          type: string
          title: Skill Id
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /stages/{stage_id}:
    get:
      tags:
      - stages
      summary: Get Stage Detail
      description: Get aggregated detail for a stage.
      operationId: get_stage_detail_api_v1_stages__stage_id__get
      parameters:
      - name: stage_id
        in: path
        required: true
        schema:
          type: string
          title: Stage Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Get Stage Detail Api V1 Stages  Stage Id  Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
